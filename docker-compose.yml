version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: 06-deployment/Dockerfile
    container_name: soc-tutor-rag-api
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching (future)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

networks:
  default:
    name: soc-tutor-network